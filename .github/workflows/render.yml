name: 🎬 Twick Video Renderer

on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      content:
        required: true
      config:
        required: true
      templateName:
        required: true
      templateCode:
        required: true

jobs:
  render-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      - name: 🛠️ pnpm 설치
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🟢 Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' 

      - name: 📦 의존성 설치
        run: pnpm install

      - name: 🛡️ 리눅스 환경 세팅 (Xvfb 및 Chrome)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo apt-get update
          sudo apt-get install -y xvfb
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      # 🔥 [가장 핵심] OS 레벨 크롬 하이재킹 스크립트 생성
      - name: 🛠️ 워커 스레드 우회용 크롬 래퍼 생성
        run: |
          echo '#!/bin/bash' > chrome-wrapper.sh
          # 워커가 크롬을 부를 때 무조건 이 플래그들을 강제 주입하여 실행함
          echo 'exec /usr/bin/google-chrome --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu --disable-accelerated-video-encode --disable-accelerated-video-decode "$@"' >> chrome-wrapper.sh
          chmod +x chrome-wrapper.sh
          # Puppeteer가 기본 크롬 대신 이 스크립트를 실행하도록 환경변수 설정
          echo "PUPPETEER_EXECUTABLE_PATH=$(pwd)/chrome-wrapper.sh" >> $GITHUB_ENV

      - name: 🎬 Run Render Engine (Xvfb)
        # 워커 내부까지 Xvfb 화면을 전달하기 위해 auto-servernum 사용
        run: xvfb-run --auto-servernum --server-args="-screen 0 1080x1920x24" node github-render.js
        env:
          POST_TITLE: ${{ github.event.inputs.title }}
          POST_CONTENT: ${{ github.event.inputs.content }}
          POST_CONFIG: ${{ github.event.inputs.config }}
          TEMPLATE_NAME: ${{ github.event.inputs.templateName }}
          TEMPLATE_CODE: ${{ github.event.inputs.templateCode }}

      - name: 🚀 완성된 영상 업로드
        run: |
          RESPONSE=$(curl -s -F "file=@output/final_shorts.mp4" https://tmpfiles.org/api/v1/upload)
          DOWNLOAD_URL=$(echo $RESPONSE | jq -r '.data.url')
          echo "👉 Download URL: $DOWNLOAD_URL"
          
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output/final_shorts.mp4