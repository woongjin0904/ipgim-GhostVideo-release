name: 🎬 Twick Video Renderer

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Post Title'
        required: true
      content:
        description: 'Post Content'
        required: true
      config:
        description: 'Template Config JSON'
        required: true
      templateName:
        description: 'Selected Template Name'
        required: true
      templateCode:
        description: 'Raw Template Code'
        required: true

jobs:
  render-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      - name: 🛠️ pnpm 설치
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🟢 Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' 

      - name: 📦 의존성 설치
        run: pnpm install

      - name: 🛡️ 리눅스 보안 해제 및 가상 디스플레이(Xvfb) 세팅
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome
        
      - name: Fix FFmpeg and FFprobe Permissions
        run: |
          find node_modules -name "ffprobe" -type f -exec chmod +x {} \;
          find node_modules -name "ffmpeg" -type f -exec chmod +x {} \;

      - name: Run Twick Render
        run: xvfb-run --auto-servernum --server-args="-screen 0 720x1280x24 -ac" node github-render.js
        env:
          DEBUG: 'puppeteer:*'
          REMOTION_PUPPETEER_LOG_LEVEL: 'verbose'
          POST_TITLE: ${{ inputs.title }}
          POST_CONTENT: ${{ inputs.content }}
          POST_CONFIG: ${{ inputs.config }}
          TEMPLATE_NAME: ${{ inputs.templateName }}
          TEMPLATE_CODE: ${{ inputs.templateCode }}

      - name: 🚀 완성된 영상 외부로 쏘기
        run: |
          echo "tmpfiles.org 서버로 영상 업로드 중..."
          RESPONSE=$(curl -s -F "file=@output/final_shorts.mp4" https://tmpfiles.org/api/v1/upload)
          DOWNLOAD_URL=$(echo $RESPONSE | jq -r '.data.url')
          
          echo ""
          echo "======================================================"
          echo "🎉 렌더링 완벽 성공! 아래 링크를 클릭하여 영상을 다운로드 하세요:"
          echo "👉 $DOWNLOAD_URL"
          echo "======================================================"
          
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output/final_shorts.mp4