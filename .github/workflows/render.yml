name: 🎬 Twick Video Renderer

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Post Title'
        required: true
      content:
        description: 'Post Content'
        required: true
      config:
        description: 'Template Config JSON'
        required: true
      templateName:
        description: 'Selected Template Name'
        required: true
      templateCode:
        description: 'Raw Template Code'
        required: true

jobs:
  render-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      - name: 🛠️ pnpm 설치
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🟢 Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' 

      - name: 📦 의존성 설치
        run: pnpm install

      - name: 🛡️ 리눅스 보안 해제 및 Xvfb 세팅
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo apt-get update
          sudo apt-get install -y xvfb

      # 🔥 [핵심 1] 진짜 Google Chrome 설치 (MP4, H264 코덱 포함)
      - name: 🌐 진짜 Google Chrome 설치
        run: |
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: 🎬 Run Render Engine (Xvfb)
        run: xvfb-run --server-num=99 --server-args="-screen 0 1080x1920x24" node github-render.js
        env:
          POST_TITLE: ${{ github.event.inputs.title }}
          POST_CONTENT: ${{ github.event.inputs.content }}
          POST_CONFIG: ${{ github.event.inputs.config }}
          TEMPLATE_NAME: ${{ github.event.inputs.templateName }}
          TEMPLATE_CODE: ${{ github.event.inputs.templateCode }}

      - name: 🚀 완성된 영상 업로드
        run: |
          RESPONSE=$(curl -s -F "file=@output/final_shorts.mp4" https://tmpfiles.org/api/v1/upload)
          DOWNLOAD_URL=$(echo $RESPONSE | jq -r '.data.url')
          echo "👉 Download URL: $DOWNLOAD_URL"
          
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output/final_shorts.mp4